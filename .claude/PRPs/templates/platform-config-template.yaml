# 🏗️ Platform Configuration Template (SaaS Factory V3)
# Protocol: A2A (Agent-to-Agent)

platform:
  name: "Generated Project Name"
  version: "1.0.0"
  created_at: "${TIMESTAMP}"
  generated_by: "Architect Pro (A2A Agent)"

# The Golden Path Stack
stack:
  runtime: "Python 3.11" # [Node.js 22, Python 3.11/3.12, Go 1.22]
  framework: "FastAPI" # [Next.js 15, FastAPI, Gin, Express]
  database: "PostgreSQL" # [PostgreSQL (Neon), MongoDB, MySQL]
  cache: "Redis" # [Redis, In-Memory]

infrastructure:
  deployment_target: "Docker Compose" # [Docker Compose, Kubernetes, Vercel]
  deployment_environment: "Local" # [Local, AWS, GCP, Azure]

components:
  monitoring:
    metrics: "Prometheus" # [Prometheus, Datadog]
    visualization: "Grafana" # [Grafana, CloudWatch]
  security:
    scanner: "Trivy" # [Trivy, Snyk]
    policies: "CIS Benchmarks"
  ci_cd:
    provider: "Jenkins" # [Jenkins, GitHub Actions, GitLab CI]

# Deep Technical Justification (A2A Reason Phase)
decisions_justification:
  runtime: |
    Reasoning for choosing this runtime over others...
  framework: |
    Reasoning for choosing this framework...
  database: |
    Reasoning for choosing this database...
  deployment: |
    Reasoning for choosing this infra strategy...

metadata:
  ai_model: "google/gemini-2.0-flash-001"
  protocol_v: "3.2.0-A2A"
